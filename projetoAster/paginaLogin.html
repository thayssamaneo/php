<nav class="flex items-center gap-6">
<a class="font-label-caps text-ethereal-gold border-b-2 border-ethereal-gold transition-colors duration-300 flex items-center gap-1" href="index.html">
<span class="material-symbols-outlined text-[18px]">home</span>
                Home
            </a>
<button class="material-symbols-outlined text-parchment-base opacity-80 hover:text-ethereal-gold md:hidden">menu</button>
</nav>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center py-12 px-margin-mobile">
<div class="container-max w-full max-w-[500px]">
<!-- Parchment Container -->
<div class="parchment-texture p-8 md:p-12 relative overflow-hidden border border-ink-deep/10">
<!-- Decorative Corners -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-2 border-l-2 border-primary/20 m-4"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-2 border-r-2 border-primary/20 m-4"></div>
<div class="relative z-10">
<div class="text-center mb-10">
<h2 class="font-manuscript-title text-5xl text-primary mb-2">Entrar</h2>
<div class="ink-divider w-1/2 mx-auto"></div>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="block font-body-md text-ink-deep/80 text-sm italic" for="email">Informe seu Email</label>
<input class="w-full bg-surface-container-low/50 border-b-2 border-primary/20 border-t-0 border-l-0 border-r-0 py-3 px-2 font-body-md text-ink-deep placeholder:text-ink-deep/30 focus:border-ethereal-gold bg-transparent transition-all" id="email" placeholder="nome@gmail.com" required="" type="email">
</div>
<div class="space-y-2">
<label class="block font-body-md text-ink-deep/80 text-sm italic" for="password">Digite sua Senha</label>
<input class="w-full bg-surface-container-low/50 border-b-2 border-primary/20 border-t-0 border-l-0 border-r-0 py-3 px-2 font-body-md text-ink-deep placeholder:text-ink-deep/30 focus:border-ethereal-gold bg-transparent transition-all" id="password" placeholder="••••••••" required="" type="password">
</div>
<div class="flex items-center justify-between text-xs font-label-caps text-primary/70 mb-4">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded-sm border-primary/30 text-primary focus:ring-ethereal-gold" type="checkbox">
                                Lembrar-me
                            </label>
<a class="hover:text-secondary-fixed transition-colors" href="#">Esqueceu a senha?</a>
</div>
<button class="w-full bg-primary-container text-ethereal-gold font-label-caps py-4 rounded-sm border border-ethereal-gold/30 hover-glow active:scale-95 transition-all duration-300 uppercase tracking-widest flex justify-center items-center gap-2" type="submit">
                            Entrar
                            <span class="material-symbols-outlined text-[18px]">auto_stories</span>
</button>
</form>
<div class="mt-10 pt-6 border-t border-primary/10 text-center">
<p class="font-body-md text-on-surface-variant text-sm">
                            É novo por aqui? 
                            <a class="text-primary font-bold hover:text-secondary transition-all underline decoration-ethereal-gold/50 underline-offset-4 ml-1" href="#">
                                Cadastre-se
                            </a>
</p>
</div>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-arcane-purple text-parchment-base border-t border-ethereal-gold/30 px-margin-desktop mt-auto py-4">
<div class="max-w-[1140px] mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
<div class="flex items-center gap-4">
<img alt="Áster Logo Mini" class="h-10 w-10 opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCIjtRcKxY093CLigOc-c2TuTUplcLOUYI3RtQ0cRszwyn0FrVXBKvrnp_hjpVf3FPkx3SxsS7gVCY1exIMrCUS9QKYBIdZT_AHywCe0v171xl6a5h3SgyiXAkkTVe-F9Ne5-KXawLPdEi2sjf87Nn50kiZFclWUGAkfMc4Z6QpoWNrnnMopjVfpQyp2OaFrlcdj1F4nNfCkbVyJoMDZjH7pde4Z6cTD-jFpcXaE_-LxL23hF70TgUOhmt85VFKW6JPoXdjo3P7Okc">

<p class="font-body-md text-xs opacity-60">© 2026 Áster RPG. O uso comercial não é autorizado.</p>
</div>
</div>

<button class="group flex items-center gap-2 font-label-caps text-ethereal-gold text-xs uppercase tracking-widest hover:opacity-70 transition-all" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                    Voltar ao topo
                    <span class="material-symbols-outlined text-[16px] group-hover:-translate-y-1 transition-transform">north</span>
</button>
</div>
</div>
</footer>
<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#755b00';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = 'rgba(35, 26, 17, 0.8)';
            });
        });
    </script>
